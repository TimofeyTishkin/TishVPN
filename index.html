<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:8px;padding:48px 56px;
        box-shadow:0 2px 12px rgba(0,0,0,.08);max-width:420px;text-align:center}
  h1{font-size:1.6rem;color:#1a1a2e;margin-bottom:12px}
  p{color:#555;line-height:1.6;font-size:.95rem}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;
       background:#4caf50;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>
<div class="card">
  <h1><span class="dot"></span>Service Portal</h1>
  <p>This endpoint is reserved for internal infrastructure.<br>
     Please contact your system administrator if you believe<br>
     you have reached this page in error.</p>
</div>
</body>
</html>
